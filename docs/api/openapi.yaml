      parameters:
        - name: x-nxopen-api-key
          in: header
          required: true
          schema:
            type: string
          description: API KEY
        - name: descendant_id
          in: query
          schema:
            type: string
          required: true
          description: Descendant identifier (Refer to /meta/descendant API)
        - name: weapon_id
          in: query
          schema:
            type: string
          required: true
          description: Weapon identifier (Refer to /meta/weapon API)
        - name: void_battle_id
          in: query
          schema:
            type: string
          required: true
          description: Void Intercept Battle identifier (Refer to /meta/void-battle API)
        - name: period
          in: query
          schema:
            type: string
            enum:
              - 0
              - 1
              - 2
          required: true
          description: |
            Query period
            - 0: last 7 days
            - 1: last 30 days
            - 2: all time
      responses:
