  /tfd/v1/leaderboard/void-intercept-battle:
    get:
      tags:
        - leaderboard
      summary: Retrieve leaderboard for Void Intercept Battle
      description: Retrieve leaderboard for Void Intercept Battle.
      parameters:
        - name: x-nxopen-api-key
          in: header
          description: API KEY
          required: true
          schema:
            type: string
        - name: leaderboard_type
          in: query
          description: Leaderboard type
          required: true
          schema:
            type: string
            enum:
              - Solo
              - Squad
        - name: descendant_id
          in: query
          description: Descendant identifier (If the leaderboard type is Solo, enter)
          required: false
          schema:
            type: string
        - name: squad_user_count
          in: query
          description: Squad user count (If the leaderboard type is Squad, enter)
          required: false
          schema:
            type: integer
            format: int64
            enum:
              - 2
              - 3
              - 4
        - name: contents_type
          in: query
          description: Contents type (Abyss, Challenge)
          required: true
          schema:
            type: string
            enum:
              - Abyss
              - Challenge
        - name: platform_type
          in: query
