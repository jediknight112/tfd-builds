                          position_row:
                            type: string
                            description: Row coordinate of the node
                          position_column:
                            type: string
                            description: Column coordinate of the node
      description: "NOTE (tfd-builds): For older descendants (e.g., Ines `descendant_group_id` 101200026, U.Viessa 101200003) `slot_id=0` may include BOTH a generic base-board entry (`arche_tuning_board_id` 101400001) AND the descendant-specific entry. The base entry is identical bit-for-bit across users (32 nodes, cost 40, same node_ids) and is NOT user data. Newer descendants (e.g., Dia 101200032) return one entry per slot and don't exhibit this quirk. When importing, treat each entry independently and pick the one with the highest selected-cost (sum of `required_tuning_point`) as the user's actual loadout — merging entries within a slot produces phantom positions that inflate cost beyond the 40-point cap."
