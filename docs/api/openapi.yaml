openapi: 3.0.3
info:
  title: The First Descendant API
  version: 1.0.0
  contact:
    name: help_openapi@nexon.co.kr
  description: |-
    - Game data for The First Descendant becomes available after 10 minutes on average.
    - Please note that the OUID may change due to game content updates. Be cautious when renewing services based on the OUID.
    - For the interpretation of various ID values such as those for descendants, weapons, etc., please refer to the separately provided metadata API (/meta/).
    - Nickname must distinguish between uppercase and lowercase letters.
    - If you haven't logged in to the game for more than 6 months, your data may not show up as normal. In this case, log in to the game.

    ---

    This spec is auto-generated by `scripts/fetch-openapi.mjs`, which downloads the four English YAMLs Nexon publishes (account info, metadata, module recommendation, leaderboard) and merges them into a single document. Run `npm run fetch:openapi` to refresh after Nexon publishes updates.

    Schemas and operations carry `NOTE (tfd-builds): ...` callouts where Nexon's upstream behavior has quirks worth knowing about.
