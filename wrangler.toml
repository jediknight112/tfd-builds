name = "tfd-builds"
main = "worker.js"
compatibility_date = "2026-04-01"

# Static assets configuration
[site]
bucket = "./dist"

# Environment variables (non-sensitive)
[vars]
# Upstream tfd-cache URL. The Worker proxies /api/tfd/* requests here,
# adding API keys server-side. Override only if pointing at a different cache.
TFD_CACHE_URL = "https://tfd-cache.jediknight112.com"
# Required secrets (set via `wrangler secret put` or GitHub Actions):
#   TFD_API_KEY      - Nexon TFD API key
#   WORKER_API_KEY   - tfd-cache worker authentication key

# Custom domain routes
[[routes]]
pattern = "tfd-builds.jediknight112.com"
zone_name = "jediknight112.com"
custom_domain = true

# KV Namespace for URL Shortener
[[kv_namespaces]]
binding = "URL_SHORTENER"
id = "08962119bd9e470ba307d0c9320701c0"
preview_id = "7ef5c41331164b379f410ac7d81aa67b"

# Observability configuration
[observability]
enabled = true
