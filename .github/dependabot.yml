# Dependabot configuration for automatic dependency updates
version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Chicago'
    groups:
      all-deps:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
          - 'major'
        dependency-type: 'all'
    open-pull-requests-limit: 10
    reviewers:
      - 'jediknight112'
    assignees:
      - 'jediknight112'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Chicago'
    groups:
      all-actions:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
          - 'major'
    commit-message:
      prefix: 'ci'
      include: 'scope'
