name: Auto-merge Dependabot PRs

# Triggers after CI Tests completes. Avoids `gh pr merge --auto`, which
# requires the repo-level "Allow auto-merge" setting (paid feature on
# private GitHub Free repos). Using workflow_run keeps both this repo
# and tfd-cache on the same auto-merge mechanism.

on:
  workflow_run:
    workflows: ['CI Tests']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Find open PR for head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          set -euo pipefail
          PR=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[] | select(.state == "open") | .number' | head -1)
          if [ -z "$PR" ]; then
            echo "No open PR found for SHA ${{ github.event.workflow_run.head_sha }}; nothing to do."
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found PR #$PR"
          echo "number=$PR" >> "$GITHUB_OUTPUT"

      - name: Inspect PR for workflow file changes
        id: inspect
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          set -euo pipefail
          PR_DATA=$(gh pr view ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --json headRefName,files)
          BRANCH=$(echo "$PR_DATA" | jq -r .headRefName)
          WORKFLOW_FILES=$(echo "$PR_DATA" | jq -r '.files[].path' | grep '^\.github/workflows/' || true)
          if [[ "$BRANCH" == dependabot/github_actions/* ]] && [ -n "$WORKFLOW_FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              echo "$WORKFLOW_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment and skip on workflow file changes
        if: steps.inspect.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --body "⚠️ This PR modifies GitHub workflow files — skipping auto-merge for security review.

          Files: \`${{ steps.inspect.outputs.files }}\`"

      - name: Merge
        if: steps.pr.outputs.number != '' && steps.inspect.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          set -euo pipefail
          echo "CI passed for dependabot PR #${{ steps.pr.outputs.number }}; squash-merging."
          gh pr merge ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --squash --delete-branch
