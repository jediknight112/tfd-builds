name: Auto-merge Dependabot PRs

# tfd-builds is a public repo with auto-merge enabled and a branch
# ruleset requiring CI to pass. We use `gh pr merge --auto`, which
# enables GitHub-side auto-merge — it holds the merge until the
# ruleset's required checks are satisfied. Direct `gh pr merge` is
# rejected by the ruleset even after CI passes (the ruleset itself
# is the gate, not the check status). This is the inverse of the
# tfd-cache workflow, which can't use --auto because that's a paid
# feature on Free private repos.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Detect workflow file changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.pull_request.head.ref }}"
          WORKFLOW_FILES=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path' | grep '^\.github/workflows/' || true)
          if [[ "$BRANCH" == dependabot/github_actions/* ]] && [ -n "$WORKFLOW_FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              echo "$WORKFLOW_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment and skip on workflow file changes
        if: steps.check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "⚠️ This PR modifies GitHub workflow files — skipping auto-merge for security review.

          Files: \`${{ steps.check.outputs.files }}\`"

      - name: Approve and enable auto-merge
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTO_TOKEN }}
        run: |
          set -euo pipefail
          gh pr review --approve ${{ github.event.pull_request.number }}
          gh pr merge --auto --squash --delete-branch ${{ github.event.pull_request.number }}
